<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器学习模型界面</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --light-gray: #f8f9fa;
            --dark-gray: #343a40;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }
        
        .control-panel {
            flex: 0 0 300px;
            background: white;
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--box-shadow);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .panel-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark-gray);
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .control-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #555;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-button {
            width: 100%;
            border: 2px dashed #ccc;
            border-radius: var(--border-radius);
            padding: 30px 15px;
            text-align: center;
            background-color: var(--light-gray);
            color: #666;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .file-input-button:hover {
            border-color: var(--primary-color);
            background-color: rgba(67, 97, 238, 0.05);
            color: var(--primary-color);
        }
        
        .file-input {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .select-wrapper {
            position: relative;
            width: 100%;
        }
        
        .model-select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            background-color: white;
            font-size: 0.95rem;
            color: #333;
            appearance: none;
            cursor: pointer;
            transition: border 0.3s ease;
        }
        
        .model-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.2);
        }
        
        .select-arrow {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            pointer-events: none;
            color: #666;
        }
        
        .run-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }
        
        .run-button:hover {
            background-color: var(--secondary-color);
        }

        .run-button:disabled {
        background-color: #cccccc; /* 灰色背景 */
        color: #666666; /* 文字颜色 */
        cursor: not-allowed; /* 鼠标显示禁用图标 */
        }

        .visualization-panel {
            flex: 1;
            background: white;
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--box-shadow);
            display: flex;
            flex-direction: column;
        }
        
        .chart-container {
            flex: 1;
            min-height: 400px;
            margin-top: 20px;
            position: relative;
        }
        
        .selected-info {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--light-gray);
            border-radius: var(--border-radius);
            font-size: 0.9rem;
        }
        
        .info-label {
            font-weight: 600;
            color: var(--dark-gray);
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

    .radio-option {
        display: flex;
        align-items: center;
        cursor: pointer;
        position: relative;
        padding-left: 25px;
    }

    .radio-option input {
        position: absolute;
        opacity: 0;
        cursor: pointer;
    }

    .radio-checkmark {
        position: absolute;
        left: 0;
        height: 18px;
        width: 18px;
        background-color: white;
        border: 2px solid #ddd;
        border-radius: 50%;
        transition: all 0.3s ease;
    }

    .radio-option:hover .radio-checkmark {
        border-color: var(--primary-color);
    }

    .radio-option input:checked ~ .radio-checkmark {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
    }

    .radio-checkmark:after {
        content: "";
        position: absolute;
        display: none;
        top: 3px;
        left: 3px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: white;
    }

    .radio-option input:checked ~ .radio-checkmark:after {
        display: block;
    }
    </style>
</head>
<body>
    <div class="control-group">
        <label class="control-label">图像目录路径（basePath）</label>
        <input type="text" id="base-path-input" placeholder="例如：E:/dachuang/Radiomics/Data/Test" style="padding: 8px; border: 1px solid #ccc; border-radius: 8px;">
      </div>
      
      <div class="control-group">
        <label class="control-label">CSV保存路径</label>
        <input type="text" id="output-path-input" placeholder="例如：E:/dachuang/Radiomics/Data/extracted_features.csv" style="padding: 8px; border: 1px solid #ccc; border-radius: 8px;">
      </div>
      
      <button id="extract-button" class="run-button">提取Radiomics特征</button>
      
    <div class="container">
        <!-- 左侧控制面板 -->
        <div class="control-panel">
            <h2 class="panel-title">模型训练</h2>
            
            <div class="control-group">
                <label class="control-label">选择数据集</label>
                <div class="file-input-wrapper">
                    <div class="file-input-button">
                        <i class="icon">📁</i>
                        <div>点击或拖放文件</div>
                        <div class="file-name" id="file-name">未选择文件</div>
                    </div>
                    <input type="file" id="dataset-file" class="file-input" accept=".csv,.xlsx,.data">
                </div>
            </div>
            <div class="control-group">
                <label class="control-label">选择测试集（无label）</label>
                <div class="file-input-wrapper">
                    <div class="file-input-button">
                        <i class="icon">📁</i>
                        <div>点击或拖放测试文件</div>
                        <div class="file-name" id="test-file-name">未选择测试集</div>
                    </div>
                    <input type="file" id="test-file" class="file-input" accept=".csv">
                </div>
            </div>
            
            <div class="control-group">
                <label class="control-label">选择模型</label>
                <div class="select-wrapper">
                    <select id="model-select" class="model-select">
                        <option value="" disabled selected>请选择模型</option>
                        <option value="logistic">Logistic Regression</option>
                        <option value="randomforest">Random Forest</option>
                    </select>
                    <div class="select-arrow">▼</div>
                </div>
            </div>
            
            <!-- 这个按钮不变 -->
            <button id="run-model" class="run-button">训练并预测</button>
            
            <!-- 这是要控制显示隐藏的正则化选项区域 -->
            <div id="regularization-options" class="control-group" style="display: none;">
                <label class="control-label">正则化方式</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="regularization" value="l1" checked>
                        <span class="radio-checkmark"></span>
                        L1正则化
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="regularization" value="l2">
                        <span class="radio-checkmark"></span>
                        L2正则化
                    </label>
                </div>
            </div>
            <div class="selected-info">
                <div><span class="info-label">当前数据集:</span> <span id="current-dataset">无</span></div>
                <div><span class="info-label">当前模型:</span> <span id="current-model">未选择</span></div>
            </div>
            
        </div>
        
        <!-- 右侧可视化面板 -->
        <div class="visualization-panel">
            <h2 class="panel-title">模型学习曲线</h2>
            <div class="chart-container">
                <canvas id="model-chart"></canvas>
            </div>
            <h3 class="panel-title" style="margin-top: 20px;">测试集预测结果</h3>
            <div id="test-results-container" style="overflow-x: auto; max-height: 300px; border: 1px solid #eee; border-radius: 8px; padding: 10px; background: #f8f9fa;">
                <table id="test-results-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr id="test-results-header"></tr>
                    </thead>
                    <tbody id="test-results-body"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    const runButton=document.getElementById('run-model');
    const datasetFileInput = document.getElementById('dataset-file');
    const modelSelect = document.getElementById('model-select');
    const fileNameDisplay = document.getElementById('file-name');
    const currentDatasetDisplay = document.getElementById('current-dataset');
    const ctx = document.getElementById('model-chart').getContext('2d');
    const testFileInput = document.getElementById('test-file');
    const testFileNameDisplay = document.getElementById('test-file-name');
    const currentModelDisplay = document.getElementById('current-model');
    let modelType = document.getElementById('model-select').value;
    // 监听模型选择下拉框
    document.getElementById('model-select').addEventListener('change', function () {
        const selectedModel = this.value;
        const regularizationGroup = document.getElementById('regularization-options');

        if (selectedModel === 'logistic') {
            regularizationGroup.style.display = 'block';
            currentModelDisplay.textContent = 'Logistic Regression';
            modelType = 'logistic'; // 更新模型类型
        } else {
            regularizationGroup.style.display = 'none';
            currentModelDisplay.textContent = 'Random Forest';
            modelType = 'randomforest'; // 更新模型类型
        }
    });

    testFileInput.addEventListener('change', function() {
        if (this.files.length > 0) {
            testFileNameDisplay.textContent = this.files[0].name;
        } else {
            testFileNameDisplay.textContent = '未选择测试集';
        }
    });

    const modelChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: []
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 1
                }
            }
        }
    });

    // 更新文件上传处理
    datasetFileInput.addEventListener('change', async function(e) {
        if (this.files.length > 0) {
            const formData = new FormData();
            formData.append('file', this.files[0]);
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                if (response.ok) {
                    fileNameDisplay.textContent = result.filename;
                    currentDatasetDisplay.textContent = `${result.filename} (${result.sample_size} samples)`;
                } else {
                    throw new Error(result.error || '上传失败');
                }
            } catch (error) {
                alert(`上传错误: ${error.message}`);
                fileNameDisplay.textContent = '上传失败';
                currentDatasetDisplay.textContent = '无';
            }
        }
    });
    
    // 更新模型训练处理
runButton.addEventListener('click', async function () {
    if (!datasetFileInput.files.length || !testFileInput.files.length) {
        alert('请先选择训练集和测试集文件');
        return;
    }
    if (!modelSelect.value) {
            alert('请选择模型');
            return;
        }

    // 收集正则化参数和模型类型
    const modelType = document.getElementById('model-select').value;//分为logistic和randomforest两种
    const regularization = document.querySelector('input[name="regularization"]:checked').value;

    runButton.disabled = true;
    runButton.textContent = '训练中...';

    try {
        // 1. 上传训练集
        const formDataTrain = new FormData();
        formDataTrain.append('file', datasetFileInput.files[0]);

        const uploadRes = await fetch('/upload', {
            method: 'POST',
            body: formDataTrain
        });

        const uploadResult = await uploadRes.json();
        if (!uploadRes.ok) throw new Error(uploadResult.error || '训练集上传失败');

        // 2. 发起训练请求
        const trainRes = await fetch('/train', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model_type: modelType,
                regularization: regularization
            })
        });

        const trainResult = await trainRes.json();
        if (!trainRes.ok) throw new Error(trainResult.error || '训练失败');

        alert(`✅ 模型训练完成！\n训练集准确率: ${(trainResult.train_accuracy * 100).toFixed(2)}%\n测试集准确率: ${(trainResult.val_accuracy * 100).toFixed(2)}%`);

        // 更新图表
        updateLearningCurveChart(trainResult.learning_curve);

        // 3. 上传并预测测试集
        const formDataTest = new FormData();
        formDataTest.append('file', testFileInput.files[0]);

        const testRes = await fetch('/predict_test', {
            method: 'POST',
            body: formDataTest
        });

        const testResult = await testRes.json();
        if (!testRes.ok) throw new Error(testResult.error || '预测失败');

        alert('✅ 测试集预测完成，正在展示结果！');
        renderTestResults(testResult.data); // 👈 展示结果
    } catch (error) {
        alert(`❌ 错误: ${error.message}`);
    } finally {
        runButton.disabled = false;
        runButton.textContent = '运行模型';
    }
});



    document.getElementById('extract-button').addEventListener('click', async function () {
    const basePath = document.getElementById('base-path-input').value.trim();
    const outputPath = document.getElementById('output-path-input').value.trim();

    if (!basePath || !outputPath) {
        alert('请填写完整路径信息');
        return;
    }

    this.disabled = true;
    this.textContent = '提取中...';

    try {
        const response = await fetch('/extract_features', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ basePath, outputPath })
        });

        const result = await response.json();
        if (response.ok) {
            alert(`🎉 提取成功：\n${result.message}`);
        } else {
            throw new Error(result.error || '提取失败');
        }
    } catch (error) {
        alert(`❌ 提取错误：${error.message}`);
    } finally {
        this.disabled = false;
        this.textContent = '提取Radiomics特征';
    }
});

    // 更新学习曲线图表函数
    function updateLearningCurveChart(curveData) {
        if (modelType === 'randomforest') {
        // 显示随机森林的学习曲线
        modelChart.data.labels = curveData.estimators.map(est => `${est} 树`);
        modelChart.data.datasets = [
            {
                label: '训练集得分',
                data: curveData.train_scores,
                borderColor: '#4361ee',
                backgroundColor: 'rgba(67, 97, 238, 0.1)',
                borderWidth: 2,
                tension: 0.4,
                fill: true
            },
            {
                label: '验证集得分',
                data: curveData.test_scores,
                borderColor: '#4cc9f0',
                backgroundColor: 'rgba(76, 201, 240, 0.1)',
                borderWidth: 2,
                tension: 0.4,
                fill: true
            }
        ];
    } else if (modelType === 'logistic') {
        modelChart.data.labels = curveData.train_sizes.map(size => (size * 100).toFixed(0) + '%');
        modelChart.data.datasets = [
            {
                label: '训练集得分',
                data: curveData.train_scores_mean,
                borderColor: '#4361ee',
                backgroundColor: 'rgba(67, 97, 238, 0.1)',
                borderWidth: 2,
                tension: 0.4,
                fill: true
            },
            {
                label: '验证集得分',
                data: curveData.test_scores_mean,
                borderColor: '#4cc9f0',
                backgroundColor: 'rgba(76, 201, 240, 0.1)',
                borderWidth: 2,
                tension: 0.4,
                fill: true
            }
        ];       
    }
    modelChart.update();
}

    function renderTestResults(data) {
    const headerRow = document.getElementById('test-results-header');
    const body = document.getElementById('test-results-body');

    // 清空旧内容
    headerRow.innerHTML = '';
    body.innerHTML = '';

    if (!data || data.length === 0) {
        headerRow.innerHTML = '<th>没有数据</th>';
        return;
    }

    // 表头
    const headers = Object.keys(data[0]);
    headers.forEach(h => {
        const th = document.createElement('th');
        th.style.borderBottom = '1px solid #ccc';
        th.style.padding = '5px';
        th.textContent = h;
        headerRow.appendChild(th);
    });

    // 每行
    data.forEach(row => {
        const tr = document.createElement('tr');
        headers.forEach(h => {
            const td = document.createElement('td');
            td.textContent = row[h];
            td.style.padding = '5px';
            td.style.borderBottom = '1px solid #eee';
            if (h === 'predicted_label' && row[h] === 1) {
                td.style.color = 'red';
                td.style.fontWeight = 'bold';
            }
            tr.appendChild(td);
        });
        body.appendChild(tr);
    });
}


</script>
</body>
</html>
